<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#E3F2FD"/>

  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="#C62828">
    Poligoni concavi e convessi
  </text>

  <!-- convesso -->
  <g transform="translate(70 95)">
    <rect x="0" y="0" width="350" height="345" rx="28" fill="#FFFFFF" stroke="#66BB6A" stroke-width="5"/>
    <text x="175" y="45" text-anchor="middle" font-family="Arial" font-size="29" font-weight="800" fill="#1B5E20">
      CONVESSO
    </text>

    <polygon points="85,120 210,85 295,170 255,270 115,275 55,190" fill="#E8F5E9" stroke="#2E7D32" stroke-width="8" stroke-linejoin="round"/>

    <rect x="38" y="290" width="274" height="42" rx="16" fill="#E8F5E9"/>
    <text x="175" y="318" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="#1B5E20">
      non ha rientranze
    </text>
  </g>

  <!-- concavo -->
  <g transform="translate(480 95)">
    <rect x="0" y="0" width="350" height="345" rx="28" fill="#FFFFFF" stroke="#FFB300" stroke-width="5"/>
    <text x="175" y="45" text-anchor="middle" font-family="Arial" font-size="29" font-weight="800" fill="#E65100">
      CONCAVO
    </text>

    <polygon points="70,120 290,120 205,195 290,275 70,275 130,195" fill="#FFF3E0" stroke="#FB8C00" stroke-width="8" stroke-linejoin="round"/>

    <!-- freccia verso rientranza -->
    <path d="M305 205 C270 205 240 200 205 195" fill="none" stroke="#E53935" stroke-width="7" stroke-linecap="round"/>
    <path d="M205 195 L238 180 L236 214Z" fill="#E53935"/>

    <text x="275" y="225" text-anchor="middle" font-family="Arial" font-size="18" font-weight="800" fill="#E53935">
