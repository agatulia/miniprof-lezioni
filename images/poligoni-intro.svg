<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#FFF8E1"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#C62828">I poligoni</text>

  <rect x="70" y="85" width="760" height="90" rx="24" fill="#FFFFFF" stroke="#FFB300" stroke-width="5"/>
  <text x="450" y="122" text-anchor="middle" font-family="Arial" font-size="23" font-weight="700" fill="#5D4037">
    Un poligono è una figura chiusa
  </text>
  <text x="450" y="152" text-anchor="middle" font-family="Arial" font-size="21" font-weight="700" fill="#5D4037">
    formata da una linea spezzata
  </text>

  <polygon points="150,285 230,215 340,245 365,345 250,390 135,355" fill="#C8E6C9" stroke="#2E7D32" stroke-width="7"/>
  <circle cx="150" cy="285" r="9" fill="#E53935"/>
  <circle cx="230" cy="215" r="9" fill="#E53935"/>
  <circle cx="340" cy="245" r="9" fill="#E53935"/>
  <circle cx="365" cy="345" r="9" fill="#E53935"/>
  <circle cx="250" cy="390" r="9" fill="#E53935"/>
  <circle cx="135" cy="355" r="9" fill="#E53935"/>

  <text x="250" y="435" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#2E7D32">POLIGONO</text>

  <line x1="500" y1="230" x2="735" y2="230" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
  <line x1="500" y1="300" x2="735" y2="300" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
  <line x1="500" y1="370" x2="735" y2="370" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>

  <circle cx="500" cy="230" r="12" fill="#E53935"/>
  <circle cx="500" cy="300" r="12" fill="#E53935"/>
  <circle cx="500" cy="370" r="12" fill="#E53935"/>

  <text x="560" y="238" font-family="Arial" font-size="25" font-weight="700" fill="#0D47A1">lati</text>
  <text x="560" y="308" font-family="Arial" font-size="25" font-weight="700" fill="#0D47A1">vertici</text>
  <text x="560" y="378" font-family="Arial" font-size="25" font-weight="700" fill="#0D47A1">angoli</text>
</svg>
