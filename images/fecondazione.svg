<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#F3E5F5"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#4A148C">La fecondazione</text>

  <!-- fiore sezionato -->
  <g transform="translate(450 250)">
    <ellipse cx="-90" cy="-75" rx="65" ry="110" fill="#F8BBD0" stroke="#AD1457" stroke-width="4" transform="rotate(-35 -90 -75)"/>
    <ellipse cx="90" cy="-75" rx="65" ry="110" fill="#F8BBD0" stroke="#AD1457" stroke-width="4" transform="rotate(35 90 -75)"/>

    <ellipse cx="0" cy="85" rx="72" ry="70" fill="#66BB6A" stroke="#1B5E20" stroke-width="6"/>
    <circle cx="-22" cy="88" r="12" fill="#FFD54F" stroke="#F9A825" stroke-width="3"/>
    <circle cx="15" cy="75" r="12" fill="#FFD54F" stroke="#F9A825" stroke-width="3"/>
    <circle cx="25" cy="105" r="12" fill="#FFD54F" stroke="#F9A825" stroke-width="3"/>

    <path d="M0 80 C2 15 -2 -55 0 -140" stroke="#2E7D32" stroke-width="18" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="-155" r="25" fill="#81C784" stroke="#1B5E20" stroke-width="5"/>

    <!-- tubo pollinico -->
    <path d="M0 -150 C15 -80 12 -5 15 60 C15 78 10 85 2 90" stroke="#8E24AA" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="-185" r="10" fill="#FFD54F"/>
    <circle cx="8" cy="-174" r="8" fill="#FFD54F"/>
    <circle cx="-10" cy="-172" r="8" fill="#FFD54F"/>
  </g>

  <!-- frecce/etichette -->
  <rect x="60" y="120" width="280" height="75" rx="22" fill="#FFFFFF" stroke="#8E24AA" stroke-width="5"/>
  <text x="200" y="150" text-anchor="middle" font-family="Arial" font-size="21" font-weight="700" fill="#4A148C">Il polline scende</text>
  <text x="200" y="176" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#4A148C">verso l'ovulo</text>
  <path d="M340 158 C390 150 415 140 450 105" stroke="#8E24AA" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M450 105 L410 115 L435 140Z" fill="#8E24AA"/>

  <rect x="570" y="330" width="285" height="85" rx="22" fill="#FFFFFF" stroke="#43A047" stroke-width="5"/>
  <text x="712" y="362" text-anchor="middle" font-family="Arial" font-size="21" font-weight="700" fill="#1B5E20">Cellula maschile</text>
  <text x="712" y="388" text-anchor="middle" font-family="Arial" font-size="21" font-weight="700" fill="#1B5E20">+ cellula femminile</text>

  <path d="M570 370 C520 355 495 340 470 325" stroke="#43A047" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M470 325 L508 325 L492 352Z" fill="#43A047"/>

  <rect x="270" y="430" width="360" height="50" rx="18" fill="#FFFDE7" stroke="#FBC02D" stroke-width="4"/>
  <text x="450" y="462" text-anchor="middle" font-family="Arial" font-size="23" font-weight="700" fill="#E65100">questo incontro si chiama fecondazione</text>
</svg>
