<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#E3F2FD"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#1B5E20">La germinazione</text>
  <rect x="0" y="345" width="900" height="155" fill="#8D6E63"/>

  <!-- fase 1 -->
  <g transform="translate(130 345)">
    <ellipse cx="0" cy="35" rx="55" ry="30" fill="#6D4C41" stroke="#3E2723" stroke-width="5"/>
    <text x="0" y="105" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#FFFFFF">1. seme</text>
  </g>

  <!-- fase 2 -->
  <g transform="translate(320 330)">
    <ellipse cx="0" cy="45" rx="55" ry="30" fill="#6D4C41" stroke="#3E2723" stroke-width="5"/>
    <path d="M10 45 C25 70 25 95 10 120" stroke="#F5F5DC" stroke-width="9" fill="none" stroke-linecap="round"/>
    <text x="0" y="135" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#FFFFFF">2. radichetta</text>
  </g>

  <!-- fase 3 -->
  <g transform="translate(520 315)">
    <ellipse cx="0" cy="60" rx="55" ry="30" fill="#6D4C41" stroke="#3E2723" stroke-width="5"/>
    <path d="M5 55 C0 20 10 0 35 -25" stroke="#2E7D32" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M5 65 C20 95 20 120 5 145" stroke="#F5F5DC" stroke-width="9" fill="none" stroke-linecap="round"/>
    <ellipse cx="55" cy="-25" rx="35" ry="18" fill="#66BB6A" stroke="#2E7D32" stroke-width="4" transform="rotate(-25 55 -25)"/>
    <text x="0" y="160" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#FFFFFF">3. germoglio</text>
  </g>

  <!-- fase 4 -->
  <g transform="translate(730 270)">
    <ellipse cx="0" cy="105" rx="55" ry="30" fill="#6D4C41" stroke="#3E2723" stroke-width="5"/>
    <path d="M0 100 C-5 50 10 10 35 -30" stroke="#2E7D32" stroke-width="12" fill="none" stroke-linecap="round"/>
    <ellipse cx="60" cy="-35" rx="45" ry="22" fill="#66BB6A" stroke="#2E7D32" stroke-width="4" transform="rotate(-25 60 -35)"/>
    <ellipse cx="10" cy="10" rx="42" ry="20" fill="#81C784" stroke="#2E7D32" stroke-width="4" transform="rotate(35 10 10)"/>
    <path d="M0 108 C20 145 15 175 0 205" stroke="#F5F5DC" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M0 108 C-30 145 -35 175 -55 205" stroke="#F5F5DC" stroke-width="7" fill="none" stroke-linecap="round"/>
    <text x="0" y="225" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#FFFFFF">4. piantina</text>
  </g>

  <!-- frecce -->
  <g stroke="#FB8C00" stroke-width="9" fill="none" stroke-linecap="round">
    <path d="M195 365 C230 350 255 350 285 365"/>
    <path d="M385 365 C425 345 460 345 500 365"/>
    <path d="M585 365 C625 340 665 335 705 350"/>
  </g>
  <path d="M285 365 L248 348 L258 388Z" fill="#FB8C00"/>
  <path d="M500 365 L462 348 L475 388Z" fill="#FB8C00"/>
  <path d="M705 350 L665 338 L682 375Z" fill="#FB8C00"/>

  <rect x="240" y="80" width="420" height="75" rx="22" fill="#FFFFFF" stroke="#43A047" stroke-width="5"/>
  <text x="450" y="110" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">Dal seme nasce una nuova piantina</text>
  <text x="450" y="137" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#1B5E20">servono acqua, aria e temperatura adatta</text>
</svg>
