  <ellipse cx="748" cy="315" rx="22" ry="45" fill="#EC407A" stroke="#AD1457" stroke-width="4"/>
  <ellipse cx="705" cy="270" rx="45" ry="22" fill="#F06292" stroke="#AD1457" stroke-width="4"/>
  <ellipse cx="790" cy="270" rx="45" ry="22" fill="#F06292" stroke="#AD1457" stroke-width="4"/>
  <text x="748" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1B5E20">
