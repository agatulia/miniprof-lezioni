  </text>

  <!-- frecce -->
  <path d="M195 330 C230 285 250 270 285 275" fill="none" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
  <path d="M285 275 L262 262 L270 292 Z" fill="#1976D2"/>
