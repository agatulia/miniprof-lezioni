  <ellipse cx="305" cy="300" rx="38" ry="22" fill="#81C784" stroke="#2E7D32" stroke-width="4" transform="rotate(35 305 300)"/>
  <text x="320" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1B5E20">
