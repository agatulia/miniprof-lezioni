  </text>

  <!-- fiore -->
  <rect x="735" y="295" width="25" height="100" rx="10" fill="#2E7D32"/>
  <circle cx="748" cy="270" r="25" fill="#FFD54F" stroke="#F9A825" stroke-width="4"/>
