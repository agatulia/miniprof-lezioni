  </text>

  <!-- pianta adulta -->
  <rect x="535" y="230" width="35" height="165" rx="15" fill="#2E7D32"/>
  <ellipse cx="510" cy="250" rx="65" ry="35" fill="#66BB6A" stroke="#2E7D32" stroke-width="5" transform="rotate(-30 510 250)"/>
  <ellipse cx="600" cy="245" rx="70" ry="38" fill="#66BB6A" stroke="#2E7D32" stroke-width="5" transform="rotate(30 600 245)"/>
  <ellipse cx="535" cy="185" rx="60" ry="35" fill="#81C784" stroke="#2E7D32" stroke-width="5" transform="rotate(-10 535 185)"/>
  <ellipse cx="590" cy="185" rx="60" ry="35" fill="#81C784" stroke="#2E7D32" stroke-width="5" transform="rotate(20 590 185)"/>
  <text x="555" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1B5E20">
