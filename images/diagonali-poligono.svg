<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#FFF8E1"/>

  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="#C62828">
    Le diagonali
  </text>

  <rect x="95" y="80" width="710" height="65" rx="22" fill="#FFFFFF" stroke="#FFB300" stroke-width="5"/>
  <text x="450" y="110" text-anchor="middle" font-family="Arial" font-size="21" font-weight="800" fill="#5D4037">
    Una diagonale unisce due vertici non consecutivi
  </text>
  <text x="450" y="135" text-anchor="middle" font-family="Arial" font-size="19" font-weight="800" fill="#5D4037">
    cioè due vertici che non sono vicini
  </text>

  <!-- poligono -->
  <polygon points="280,190 500,160 690,270 610,410 330,405 200,285" fill="#FFFFFF" stroke="#2E7D32" stroke-width="9" stroke-linejoin="round"/>

  <!-- diagonali -->
  <line x1="280" y1="190" x2="610" y2="410" stroke="#E53935" stroke-width="7" stroke-dasharray="12 10"/>
  <line x1="500" y1="160" x2="330" y2="405" stroke="#1976D2" stroke-width="7" stroke-dasharray="12 10"/>
  <line x1="200" y1="285" x2="690" y2="270" stroke="#FB8C00" stroke-width="7" stroke-dasharray="12 10"/>

  <!-- vertici -->
  <g fill="#E53935">
    <circle cx="280" cy="190" r="11"/>
    <circle cx="500" cy="160" r="11"/>
    <circle cx="690" cy="270" r="11"/>
    <circle cx="610" cy="410" r="11"/>
    <circle cx="330" cy="405" r="11"/>
    <circle cx="200" cy="285" r="11"/>
  </g>

  <rect x="310" y="430" width="280" height="45" rx="16" fill="#E3F2FD" stroke="#42A5F5" stroke-width="4"/>
  <text x="450" y="459" text-anchor="middle" font-family="Arial" font-size="22" font-weight="800" fill="#0D47A1">
    segmenti interni
  </text>
</svg>
