<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#F1F8E9"/>

  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="#C62828">
    Poligoni regolari e irregolari
  </text>

  <!-- regolare -->
  <g transform="translate(65 95)">
    <rect x="0" y="0" width="370" height="350" rx="28" fill="#FFFFFF" stroke="#66BB6A" stroke-width="5"/>
    <text x="185" y="45" text-anchor="middle" font-family="Arial" font-size="28" font-weight="800" fill="#1B5E20">
      REGOLARE
    </text>

    <polygon points="185,85 275,135 275,235 185,285 95,235 95,135" fill="#E8F5E9" stroke="#2E7D32" stroke-width="8" stroke-linejoin="round"/>

    <!-- segni lati uguali -->
    <g stroke="#C62828" stroke-width="5" stroke-linecap="round">
      <line x1="225" y1="105" x2="235" y2="112"/>
      <line x1="277" y1="180" x2="277" y2="195"/>
      <line x1="225" y1="265" x2="235" y2="258"/>
      <line x1="145" y1="265" x2="135" y2="258"/>
      <line x1="93" y1="180" x2="93" y2="195"/>
      <line x1="145" y1="105" x2="135" y2="112"/>
    </g>

    <rect x="35" y="295" width="300" height="42" rx="16" fill="#E8F5E9"/>
    <text x="185" y="322" text-anchor="middle" font-family="Arial" font-size="19" font-weight="800" fill="#1B5E20">
      lati e angoli tutti uguali
    </text>
  </g>

  <!-- irregolare -->
  <g transform="translate(465 95)">
    <rect x="0" y="0" width="370" height="350" rx="28" fill="#FFFFFF" stroke="#FFB300" stroke-width="5"/>
    <text x="185" y="45" text-anchor="middle" font-family="Arial" font-size="28" font-weight="800" fill="#E65100">
      IRREGOLARE
    </text>

    <polygon points="95,115 245,80 300,190 230,280 80,240 55,160" fill="#FFF3E0" stroke="#FB8C00" stroke-width="8" stroke-linejoin="round"/>

    <text x="185" y="185" text-anchor="middle" font-family="Arial" font-size="21" font-weight="800" fill="#5D4037">
      lati diversi
    </text>

    <rect x="35" y="295" width="300" height="42" rx="16" fill="#FFF3E0"/>
    <text x="185" y="322" text-anchor="middle" font-family="Arial" font-size="19" font-weight="800" fill="#E65100">
      non tutti uguali
    </text>
  </g>
</svg>
