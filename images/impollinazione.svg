<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#E8F5E9"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#1B5E20">L'impollinazione</text>

  <rect x="0" y="390" width="900" height="110" fill="#66BB6A"/>

  <!-- fiore sinistra -->
  <g transform="translate(210 230)">
    <rect x="-12" y="70" width="24" height="120" rx="10" fill="#2E7D32"/>
    <circle cx="0" cy="0" r="22" fill="#FFD54F"/>
    <ellipse cx="0" cy="-55" rx="25" ry="55" fill="#F06292" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="0" cy="55" rx="25" ry="55" fill="#F06292" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="-55" cy="0" rx="55" ry="25" fill="#F48FB1" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="55" cy="0" rx="55" ry="25" fill="#F48FB1" stroke="#AD1457" stroke-width="4"/>
    <g fill="#FFD54F" stroke="#F9A825" stroke-width="2">
      <circle cx="-22" cy="-15" r="8"/>
      <circle cx="20" cy="-18" r="8"/>
      <circle cx="-18" cy="22" r="8"/>
      <circle cx="22" cy="18" r="8"/>
    </g>
  </g>

  <!-- fiore destra -->
  <g transform="translate(680 230)">
    <rect x="-12" y="70" width="24" height="120" rx="10" fill="#2E7D32"/>
    <circle cx="0" cy="0" r="22" fill="#FFD54F"/>
    <ellipse cx="0" cy="-55" rx="25" ry="55" fill="#BA68C8" stroke="#6A1B9A" stroke-width="4"/>
    <ellipse cx="0" cy="55" rx="25" ry="55" fill="#BA68C8" stroke="#6A1B9A" stroke-width="4"/>
    <ellipse cx="-55" cy="0" rx="55" ry="25" fill="#CE93D8" stroke="#6A1B9A" stroke-width="4"/>
    <ellipse cx="55" cy="0" rx="55" ry="25" fill="#CE93D8" stroke="#6A1B9A" stroke-width="4"/>
  </g>

  <!-- ape -->
  <g transform="translate(445 190)">
    <ellipse cx="0" cy="0" rx="44" ry="28" fill="#FFCA28" stroke="#6D4C41" stroke-width="4"/>
    <line x1="-15" y1="-25" x2="-15" y2="25" stroke="#6D4C41" stroke-width="6"/>
    <line x1="10" y1="-25" x2="10" y2="25" stroke="#6D4C41" stroke-width="6"/>
    <circle cx="43" cy="-3" r="22" fill="#6D4C41"/>
    <ellipse cx="-18" cy="-45" rx="34" ry="17" fill="#B3E5FC" opacity="0.8"/>
    <ellipse cx="20" cy="-45" rx="34" ry="17" fill="#B3E5FC" opacity="0.8"/>
    <circle cx="52" cy="-8" r="4" fill="#000"/>
  </g>

  <!-- percorso polline -->
  <path d="M270 185 C355 120 530 115 625 180" stroke="#FB8C00" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="16 12"/>
  <path d="M625 180 L585 168 L600 205Z" fill="#FB8C00"/>

  <g fill="#FFD54F">
    <circle cx="330" cy="150" r="7"/>
    <circle cx="385" cy="130" r="7"/>
    <circle cx="445" cy="125" r="7"/>
    <circle cx="505" cy="135" r="7"/>
    <circle cx="565" cy="155" r="7"/>
  </g>

  <rect x="250" y="70" width="400" height="65" rx="22" fill="#FFFFFF" stroke="#FB8C00" stroke-width="5"/>
  <text x="450" y="98" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#E65100">Il polline passa</text>
  <text x="450" y="122" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#E65100">dalle antere al pistillo</text>
</svg>
