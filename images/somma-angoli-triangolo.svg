<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#E3F2FD"/>

  <text x="450" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#C62828">
    Somma degli angoli interni
  </text>

  <rect x="115" y="70" width="670" height="70" rx="24" fill="#FFFFFF" stroke="#90CAF9" stroke-width="5"/>
  <text x="450" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0D47A1">
    In ogni triangolo la somma degli angoli interni
  </text>
  <text x="450" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0D47A1">
    è sempre 180°
  </text>

  <!-- triangolo -->
  <polygon points="210,375 690,375 450,165" fill="#FFFFFF" stroke="#2E7D32" stroke-width="8" stroke-linejoin="round"/>

  <!-- vertici -->
  <circle cx="210" cy="375" r="7" fill="#2E7D32"/>
  <circle cx="690" cy="375" r="7" fill="#2E7D32"/>
  <circle cx="450" cy="165" r="7" fill="#2E7D32"/>

  <!-- angolo A basso sinistra, dentro al triangolo -->
  <path d="M252 375 A42 42 0 0 1 271 343" fill="none" stroke="#FFB300" stroke-width="11" stroke-linecap="round"/>
  <text x="278" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#FF8F00">
    A
  </text>

  <!-- angolo B basso destra, dentro al triangolo -->
  <path d="M629 343 A42 42 0 0 1 648 375" fill="none" stroke="#42A5F5" stroke-width="11" stroke-linecap="round"/>
  <text x="622" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#1976D2">
    B
  </text>

  <!-- angolo C alto, dentro al triangolo -->
  <path d="M424 188 A40 40 0 0 1 476 188" fill="none" stroke="#EC407A" stroke-width="11" stroke-linecap="round"/>
  <text x="450" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#AD1457">
    C
  </text>

  <!-- linee leggere verso la formula -->
  <line x1="280" y1="355" x2="360" y2="425" stroke="#FFB300" stroke-width="4" stroke-dasharray="8 8"/>
  <line x1="620" y1="355" x2="540" y2="425" stroke="#42A5F5" stroke-width="4" stroke-dasharray="8 8"/>
  <line x1="450" y1="230" x2="450" y2="425" stroke="#EC407A" stroke-width="4" stroke-dasharray="8 8"/>

  <!-- formula -->
  <rect x="210" y="420" width="480" height="58" rx="20" fill="#FFFFFF" stroke="#FFB300" stroke-width="5"/>
  <text x="450" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="29" font-weight="800" fill="#5D4037">
    A + B + C = 180°
  </text>
</svg>
