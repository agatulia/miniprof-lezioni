  </text>

  <!-- sole -->
  <circle cx="760" cy="85" r="38" fill="#FFD54F"/>
  <g stroke="#FFD54F" stroke-width="7" stroke-linecap="round">
    <line x1="760" y1="30" x2="760" y2="10"/>
    <line x1="760" y1="140" x2="760" y2="160"/>
    <line x1="705" y1="85" x2="685" y2="85"/>
    <line x1="815" y1="85" x2="835" y2="85"/>
    <line x1="720" y1="45" x2="705" y2="30"/>
    <line x1="800" y1="125" x2="815" y2="140"/>
    <line x1="800" y1="45" x2="815" y2="30"/>
    <line x1="720" y1="125" x2="705" y2="140"/>
  </g>
  <text x="760" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F57F17">
    luce del Sole
  </text>
</svg>
