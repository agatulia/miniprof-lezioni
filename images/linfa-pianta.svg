  </text>

  <!-- pianta -->
  <rect x="430" y="175" width="45" height="200" rx="20" fill="#2E7D32"/>
  <ellipse cx="380" cy="190" rx="90" ry="43" fill="#66BB6A" stroke="#2E7D32" stroke-width="5" transform="rotate(-25 380 190)"/>
  <ellipse cx="530" cy="190" rx="90" ry="43" fill="#66BB6A" stroke="#2E7D32" stroke-width="5" transform="rotate(25 530 190)"/>
  <ellipse cx="420" cy="110" rx="75" ry="40" fill="#81C784" stroke="#2E7D32" stroke-width="5" transform="rotate(-15 420 110)"/>
  <ellipse cx="500" cy="115" rx="75" ry="40" fill="#81C784" stroke="#2E7D32" stroke-width="5" transform="rotate(18 500 115)"/>

  <!-- radici -->
  <g stroke="#F5F5DC" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M450 365 C430 405 400 430 360 460"/>
    <path d="M450 365 C470 405 500 430 540 460"/>
    <path d="M450 365 C450 405 450 440 450 480"/>
    <path d="M430 400 C390 400 360 410 330 435"/>
    <path d="M475 400 C520 405 555 420 590 450"/>
  </g>

  <!-- freccia linfa grezza in salita -->
  <path d="M440 360 C440 295 440 235 440 155" stroke="#2196F3" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M440 155 L415 195 L465 195 Z" fill="#2196F3"/>

  <rect x="95" y="130" width="265" height="100" rx="24" fill="#E3F2FD" stroke="#2196F3" stroke-width="5"/>
  <text x="228" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0D47A1">
    Linfa grezza
  </text>
  <text x="228" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0D47A1">
    acqua + sali minerali
  </text>
  <path d="M360 180 C385 180 405 175 432 165" stroke="#2196F3" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M432 165 L402 154 L410 185 Z" fill="#2196F3"/>

  <!-- frecce linfa elaborata dalle foglie -->
  <path d="M505 135 C610 120 670 160 720 220" stroke="#FF9800" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M720 220 L680 205 L705 245 Z" fill="#FF9800"/>
  <path d="M500 200 C600 240 625 300 610 355" stroke="#FF9800" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M610 355 L595 310 L640 330 Z" fill="#FF9800"/>

  <rect x="585" y="255" width="260" height="115" rx="24" fill="#FFF3E0" stroke="#FF9800" stroke-width="5"/>
  <text x="715" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#E65100">
    Linfa elaborata
  </text>
  <text x="715" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#E65100">
