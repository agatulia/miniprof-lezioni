<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#E8F5E9"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#1B5E20">Dal fiore al frutto</text>

  <rect x="0" y="390" width="900" height="110" fill="#66BB6A"/>

  <!-- fiore -->
  <g transform="translate(210 235)">
    <rect x="-12" y="70" width="24" height="125" rx="10" fill="#2E7D32"/>
    <circle cx="0" cy="0" r="22" fill="#FFD54F"/>
    <ellipse cx="0" cy="-55" rx="25" ry="55" fill="#F06292" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="0" cy="55" rx="25" ry="55" fill="#F06292" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="-55" cy="0" rx="55" ry="25" fill="#F48FB1" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="55" cy="0" rx="55" ry="25" fill="#F48FB1" stroke="#AD1457" stroke-width="4"/>
    <ellipse cx="0" cy="35" rx="35" ry="40" fill="#66BB6A" stroke="#1B5E20" stroke-width="4"/>
    <text x="0" y="220" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#AD1457">fiore</text>
  </g>

  <!-- freccia -->
  <path d="M330 250 C420 220 500 220 590 250" stroke="#FB8C00" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M590 250 L540 230 L555 275Z" fill="#FB8C00"/>
  <text x="460" y="200" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#E65100">dopo la fecondazione</text>

  <!-- frutto -->
  <g transform="translate(680 230)">
    <path d="M0 -70 C70 -85 115 -20 100 60 C85 145 10 180 -55 120 C-115 65 -95 -50 0 -70Z" fill="#E53935" stroke="#B71C1C" stroke-width="6"/>
    <path d="M0 -70 C5 -105 35 -120 70 -105" stroke="#2E7D32" stroke-width="8" fill="none"/>
    <path d="M70 -105 C30 -115 15 -95 8 -72" fill="#66BB6A" stroke="#2E7D32" stroke-width="5"/>
    <circle cx="-10" cy="35" r="9" fill="#FFFDE7"/>
    <circle cx="25" cy="45" r="9" fill="#FFFDE7"/>
    <circle cx="10" cy="80" r="9" fill="#FFFDE7"/>
    <text x="10" y="220" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#B71C1C">frutto</text>
  </g>

  <rect x="240" y="75" width="420" height="70" rx="22" fill="#FFFFFF" stroke="#43A047" stroke-width="5"/>
  <text x="450" y="105" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">L'ovario si ingrossa</text>
  <text x="450" y="130" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#1B5E20">e diventa frutto</text>
</svg>
