<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#E8F5E9"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#1B5E20">La disseminazione</text>
  <rect x="0" y="390" width="900" height="110" fill="#66BB6A"/>

  <!-- tarassaco -->
  <g transform="translate(170 235)">
    <rect x="-5" y="60" width="10" height="125" rx="5" fill="#2E7D32"/>
    <circle cx="0" cy="0" r="35" fill="#FFFDE7" stroke="#BDBDBD" stroke-width="3"/>
    <g stroke="#BDBDBD" stroke-width="3">
      <line x1="0" y1="0" x2="-45" y2="-30"/>
      <line x1="0" y1="0" x2="45" y2="-30"/>
      <line x1="0" y1="0" x2="-40" y2="25"/>
      <line x1="0" y1="0" x2="40" y2="25"/>
      <line x1="0" y1="0" x2="0" y2="-55"/>
    </g>
    <text x="0" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">vento</text>
  </g>

  <!-- semi vento -->
  <g stroke="#90A4AE" stroke-width="3">
    <line x1="270" y1="160" x2="310" y2="130"/>
    <line x1="330" y1="190" x2="370" y2="160"/>
    <line x1="295" y1="235" x2="335" y2="205"/>
  </g>
  <g fill="#FFFDE7" stroke="#90A4AE" stroke-width="2">
    <circle cx="310" cy="130" r="8"/>
    <circle cx="370" cy="160" r="8"/>
    <circle cx="335" cy="205" r="8"/>
  </g>
  <path d="M260 125 C325 90 390 95 445 125" stroke="#29B6F6" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M445 125 L405 112 L420 150Z" fill="#29B6F6"/>

  <!-- bardana su animale -->
  <g transform="translate(460 270)">
    <ellipse cx="0" cy="35" rx="95" ry="55" fill="#A1887F" stroke="#5D4037" stroke-width="5"/>
    <circle cx="90" cy="10" r="35" fill="#A1887F" stroke="#5D4037" stroke-width="5"/>
    <circle cx="100" cy="0" r="5" fill="#000"/>
    <path d="M120 5 C150 0 155 20 130 30" stroke="#5D4037" stroke-width="6" fill="none"/>
    <g fill="#8D6E63" stroke="#3E2723" stroke-width="3">
      <circle cx="-30" cy="5" r="16"/>
      <circle cx="5" cy="60" r="16"/>
      <circle cx="35" cy="25" r="16"/>
    </g>
    <text x="0" y="155" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#5D4037">animali</text>
  </g>

  <!-- frutto che lancia -->
  <g transform="translate(750 260)">
    <ellipse cx="0" cy="55" rx="55" ry="30" fill="#8BC34A" stroke="#2E7D32" stroke-width="5"/>
    <path d="M-15 55 C20 35 40 35 70 20" stroke="#2E7D32" stroke-width="6" fill="none"/>
    <g fill="#6D4C41">
      <circle cx="95" cy="5" r="8"/>
      <circle cx="125" cy="-10" r="8"/>
      <circle cx="150" cy="10" r="8"/>
    </g>
    <path d="M45 40 C85 5 115 -5 160 0" stroke="#FB8C00" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M160 0 L120 -15 L132 25Z" fill="#FB8C00"/>
    <text x="0" y="155" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">lancio</text>
  </g>

  <rect x="225" y="70" width="450" height="55" rx="18" fill="#FFFFFF" stroke="#43A047" stroke-width="5"/>
  <text x="450" y="105" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">I semi si allontanano dalla pianta madre</text>
</svg>
