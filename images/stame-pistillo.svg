<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#FFFDE7"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#1B5E20">Parte maschile e parte femminile</text>

  <!-- stame -->
  <rect x="120" y="100" width="300" height="330" rx="28" fill="#FFFFFF" stroke="#F9A825" stroke-width="6"/>
  <text x="270" y="145" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#E65100">STAME</text>
  <text x="270" y="178" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#E65100">parte maschile</text>
  <path d="M270 360 C270 285 270 220 270 185" stroke="#6D4C41" stroke-width="14" fill="none" stroke-linecap="round"/>
  <ellipse cx="270" cy="170" rx="38" ry="60" fill="#FFD54F" stroke="#F9A825" stroke-width="6"/>
  <circle cx="250" cy="150" r="6" fill="#6D4C41"/>
  <circle cx="285" cy="165" r="6" fill="#6D4C41"/>
  <circle cx="265" cy="195" r="6" fill="#6D4C41"/>
  <text x="270" y="395" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#6D4C41">filamento</text>
  <text x="270" y="250" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#F57F17">antera</text>
  <text x="270" y="315" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#6D4C41">produce polline</text>

  <!-- pistillo -->
  <rect x="480" y="100" width="300" height="330" rx="28" fill="#FFFFFF" stroke="#43A047" stroke-width="6"/>
  <text x="630" y="145" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#1B5E20">PISTILLO</text>
  <text x="630" y="178" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">parte femminile</text>
  <path d="M630 305 C632 250 628 210 630 175" stroke="#2E7D32" stroke-width="16" fill="none" stroke-linecap="round"/>
  <circle cx="630" cy="162" r="25" fill="#81C784" stroke="#1B5E20" stroke-width="5"/>
  <ellipse cx="630" cy="330" rx="70" ry="65" fill="#66BB6A" stroke="#1B5E20" stroke-width="6"/>
  <circle cx="610" cy="330" r="10" fill="#FFD54F"/>
  <circle cx="635" cy="310" r="10" fill="#FFD54F"/>
  <circle cx="650" cy="345" r="10" fill="#FFD54F"/>
  <text x="630" y="240" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">stilo</text>
  <text x="630" y="415" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">ovario con ovuli</text>
</svg>
