<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#FFF8E1"/>
  <text x="450" y="45" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#1B5E20">Il frutto e il seme</text>

  <!-- frutto tagliato -->
  <g transform="translate(260 240)">
    <path d="M0 -100 C100 -115 160 -20 125 80 C95 165 -20 170 -90 95 C-160 20 -115 -85 0 -100Z" fill="#E53935" stroke="#B71C1C" stroke-width="7"/>
    <path d="M0 -82 C75 -90 120 -15 95 65 C70 128 -15 130 -65 72 C-110 20 -80 -70 0 -82Z" fill="#FFE0B2" stroke="#FB8C00" stroke-width="5"/>
    <circle cx="8" cy="25" r="18" fill="#6D4C41"/>
    <circle cx="45" cy="45" r="15" fill="#6D4C41"/>
    <circle cx="-30" cy="50" r="15" fill="#6D4C41"/>
  </g>

  <!-- etichette frutto -->
  <g font-family="Arial" font-size="20" font-weight="700">
    <line x1="140" y1="160" x2="200" y2="175" stroke="#B71C1C" stroke-width="4"/>
    <rect x="45" y="130" width="110" height="38" rx="12" fill="#FFFFFF" stroke="#B71C1C" stroke-width="3"/>
    <text x="100" y="155" text-anchor="middle" fill="#B71C1C">buccia</text>

    <line x1="150" y1="295" x2="220" y2="270" stroke="#FB8C00" stroke-width="4"/>
    <rect x="45" y="285" width="110" height="38" rx="12" fill="#FFFFFF" stroke="#FB8C00" stroke-width="3"/>
    <text x="100" y="310" text-anchor="middle" fill="#E65100">polpa</text>

    <line x1="380" y1="310" x2="315" y2="285" stroke="#6D4C41" stroke-width="4"/>
    <rect x="375" y="295" width="100" height="38" rx="12" fill="#FFFFFF" stroke="#6D4C41" stroke-width="3"/>
    <text x="425" y="320" text-anchor="middle" fill="#6D4C41">seme</text>
  </g>

  <!-- seme sezionato -->
  <g transform="translate(650 245)">
    <ellipse cx="0" cy="0" rx="80" ry="130" fill="#D7CCC8" stroke="#5D4037" stroke-width="7"/>
    <ellipse cx="-15" cy="-10" rx="50" ry="105" fill="#FFF8E1" stroke="#8D6E63" stroke-width="4"/>
    <path d="M15 45 C40 25 55 55 35 85 C20 105 -15 95 -5 65 C0 55 5 50 15 45Z" fill="#8D6E63" stroke="#5D4037" stroke-width="4"/>
    <circle cx="10" cy="65" r="10" fill="#66BB6A"/>
  </g>

  <!-- etichette seme -->
  <g font-family="Arial" font-size="19" font-weight="700">
    <line x1="760" y1="135" x2="715" y2="170" stroke="#5D4037" stroke-width="4"/>
    <rect x="740" y="105" width="140" height="38" rx="12" fill="#FFFFFF" stroke="#5D4037" stroke-width="3"/>
    <text x="810" y="130" text-anchor="middle" fill="#5D4037">tegumento</text>

    <line x1="760" y1="245" x2="650" y2="225" stroke="#FBC02D" stroke-width="4"/>
    <rect x="740" y="225" width="140" height="38" rx="12" fill="#FFFFFF" stroke="#FBC02D" stroke-width="3"/>
    <text x="810" y="250" text-anchor="middle" fill="#F57F17">cotiledone</text>

    <line x1="760" y1="345" x2="665" y2="310" stroke="#2E7D32" stroke-width="4"/>
    <rect x="740" y="330" width="140" height="38" rx="12" fill="#FFFFFF" stroke="#2E7D32" stroke-width="3"/>
    <text x="810" y="355" text-anchor="middle" fill="#2E7D32">embrione</text>
  </g>

  <rect x="210" y="420" width="480" height="55" rx="18" fill="#FFFFFF" stroke="#43A047" stroke-width="4"/>
  <text x="450" y="455" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1B5E20">L'embrione è la futura piantina</text>
</svg>
