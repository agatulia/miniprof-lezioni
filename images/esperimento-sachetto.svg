<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#F1F8E9"/>
  <text x="450" y="48" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#1B5E20">Esperimento del sacchetto</text>

  <!-- tavolo -->
  <rect x="0" y="420" width="900" height="80" fill="#A1887F"/>

  <!-- vasetto normale -->
  <rect x="130" y="330" width="150" height="100" rx="15" fill="#FFB74D" stroke="#E65100" stroke-width="5"/>
  <path d="M130 335 L280 335 L260 430 L150 430Z" fill="#FB8C00"/>
  <rect x="160" y="285" width="20" height="60" rx="8" fill="#2E7D32"/>
  <ellipse cx="145" cy="285" rx="55" ry="28" fill="#66BB6A" stroke="#2E7D32" stroke-width="4" transform="rotate(-25 145 285)"/>
  <ellipse cx="205" cy="270" rx="55" ry="28" fill="#81C784" stroke="#2E7D32" stroke-width="4" transform="rotate(25 205 270)"/>
  <text x="205" y="465" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#5D4037">prima</text>

  <!-- vasetto con sacchetto -->
  <rect x="600" y="330" width="150" height="100" rx="15" fill="#FFB74D" stroke="#E65100" stroke-width="5"/>
  <path d="M600 335 L750 335 L730 430 L620 430Z" fill="#FB8C00"/>
  <rect x="630" y="285" width="20" height="60" rx="8" fill="#2E7D32"/>
  <ellipse cx="615" cy="285" rx="55" ry="28" fill="#66BB6A" stroke="#2E7D32" stroke-width="4" transform="rotate(-25 615 285)"/>
  <ellipse cx="675" cy="270" rx="55" ry="28" fill="#81C784" stroke="#2E7D32" stroke-width="4" transform="rotate(25 675 270)"/>

  <!-- sacchetto -->
  <path d="M560 110 C635 75 760 90 800 145 C835 205 810 330 765 365 C705 410 585 380 545 320 C505 260 505 155 560 110Z" fill="#E1F5FE" stroke="#0288D1" stroke-width="6" opacity="0.75"/>
  <path d="M575 130 C650 100 735 110 775 160" stroke="#81D4FA" stroke-width="5" fill="none"/>

  <!-- gocce -->
  <g fill="#29B6F6">
    <path d="M595 180 C585 160 603 150 596 135 C620 155 625 175 612 190 C604 200 599 195 595 180Z"/>
    <path d="M730 205 C720 185 738 175 731 160 C755 180 760 200 747 215 C739 225 734 220 730 205Z"/>
    <path d="M665 325 C655 305 673 295 666 280 C690 300 695 320 682 335 C674 345 669 340 665 325Z"/>
    <path d="M775 290 C765 270 783 260 776 245 C800 265 805 285 792 300 C784 310 779 305 775 290Z"/>
  </g>

  <text x="675" y="465" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#5D4037">dopo alcune ore</text>

  <!-- freccia -->
  <path d="M330 250 C410 220 475 220 545 250" stroke="#1976D2" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M545 250 L505 232 L515 272Z" fill="#1976D2"/>

  <rect x="285" y="90" width="330" height="70" rx="22" fill="#FFFFFF" stroke="#4DD0E1" stroke-width="5"/>
  <text x="450" y="120" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#00695C">Il sacchetto diventa umido</text>
  <text x="450" y="145" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#00695C">per il vapore acqueo delle foglie</text>
</svg>
