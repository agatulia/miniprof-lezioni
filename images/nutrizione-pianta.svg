  </text>

  <!-- sali minerali -->
  <g fill="#FFCA28" stroke="#F9A825" stroke-width="3">
    <circle cx="635" cy="385" r="16"/>
    <circle cx="685" cy="420" r="13"/>
    <circle cx="725" cy="370" r="15"/>
    <circle cx="665" cy="455" r="12"/>
  </g>

  <text x="680" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#6D4C41">
