  <ellipse cx="515" cy="210" rx="85" ry="42" fill="#66BB6A" stroke="#2E7D32" stroke-width="5" transform="rotate(28 515 210)"/>
  <ellipse cx="420" cy="135" rx="70" ry="38" fill="#81C784" stroke="#2E7D32" stroke-width="5" transform="rotate(-18 420 135)"/>
  <ellipse cx="490" cy="140" rx="70" ry="38" fill="#81C784" stroke="#2E7D32" stroke-width="5" transform="rotate(20 490 140)"/>

  <!-- radici -->
  <g stroke="#F5F5DC" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M445 350 C440 390 410 420 370 450"/>
    <path d="M445 350 C455 395 490 420 540 450"/>
    <path d="M445 350 C440 400 450 430 450 470"/>
    <path d="M420 385 C390 395 360 405 335 425"/>
    <path d="M475 385 C505 395 540 405 575 430"/>
