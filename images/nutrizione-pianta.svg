  </text>

  <!-- frecce verso radici -->
  <g stroke="#1976D2" stroke-width="9" fill="none" stroke-linecap="round">
    <path d="M300 395 C350 385 380 370 420 355"/>
    <path d="M635 385 C570 380 520 365 470 355"/>
  </g>
  <path d="M420 355 L390 345 L400 375 Z" fill="#1976D2"/>
  <path d="M470 355 L500 345 L490 375 Z" fill="#1976D2"/>

  <!-- freccia su linfa grezza -->
  <path d="M448 345 C448 300 448 250 448 205" stroke="#03A9F4" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M448 205 L428 240 L468 240 Z" fill="#03A9F4"/>

  <rect x="515" y="285" width="250" height="55" rx="18" fill="#FFFFFF" stroke="#90CAF9" stroke-width="4"/>
  <text x="640" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0D47A1">
