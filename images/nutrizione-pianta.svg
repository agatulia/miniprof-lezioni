  </text>

  <rect x="80" y="85" width="250" height="80" rx="22" fill="#FFFFFF" stroke="#AED581" stroke-width="5"/>
  <text x="205" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1B5E20">
